<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>HAKAFAST | Live Timing</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #FFFFFF; /* לבן */
            color: #000080; /* Navy Blue */
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 { color: #000080; border-bottom: 3px solid #40E0D0; display: inline-block; padding-bottom: 10px; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 1.5em; /* פונט בולט למסכים */
        }
        th { background-color: #000080; color: #FFFFFF; padding: 15px; }
        td { border-bottom: 2px solid #000080; padding: 15px; font-weight: bold; }
        
        .best-lap { color: #800080; font-weight: 900; } /* סגול לזמן הכי מהיר */
        .tag-pro { color: #40E0D0; font-size: 0.8em; margin-right: 5px; } /* טורקיז ל-TAG */
        
        .controls { margin-bottom: 20px; }
        button { background-color: #40E0D0; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1 id="mainTitle">HAKAFAST - LIVE TIMING</h1>
    
    <div class="controls">
        <button onclick="changeLanguage('he')">עברית</button>
        <button onclick="changeLanguage('en')">English</button>
        <button onclick="changeLanguage('ar')">العربية</button>
    </div>

    <table id="timingTable">
        <thead>
            <tr>
                <th id="thPos">#</th>
                <th id="thKart">קארט</th>
                <th id="thDriver">נהג</th>
                <th id="thLast">זמן אחרון</th>
                <th id="thBest">הכי מהיר</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

    <script>
        // מילון תרגומים
        const translations = {
            he: {
                title: "HAKAFAST - זמנים בזמן אמת",
                pos: "#",
                kart: "קארט",
                driver: "נהג",
                last: "זמן אחרון",
                best: "הכי מהיר"
            },
            en: {
                title: "HAKAFAST - LIVE TIMING",
                pos: "#",
                kart: "KART",
                driver: "DRIVER",
                last: "LAST LAP",
                best: "BEST LAP"
            },
            ar: {
                title: "HAKAFAST - توقيت مباشر",
                pos: "#",
                kart: "كارت",
                driver: "سائق",
                last: "الدورة الأخيرة",
                best: "الأسرع"
            }
        };

        let currentLang = 'he';

        async function updateTable() {
            try {
                const response = await fetch('/live-timing/1'); 
                const data = await response.json();
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';

                data.forEach((row, index) => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${index + 1}</td>
                            <td>${row.kart_number}</td>
                            <td><span class="tag-pro">${row.driver_level === 'Pro' ? '[PRO]' : ''}</span>${row.driver_name}</td>
                            <td>${row.last_lap_time || '--.---'}</td>
                            <td class="best-lap">${row.best_lap_time || '--.---'}</td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error("Error fetching data:", err);
            }
        }

        function changeLanguage(lang) {
            currentLang = lang;
            const body = document.querySelector('body');
            const t = translations[lang];

            // שינוי כיוון הטקסט
            body.dir = (lang === 'en') ? 'ltr' : 'rtl';

            // עדכון הכותרות
            document.getElementById('mainTitle').innerText = t.title;
            document.getElementById('thPos').innerText = t.pos;
            document.getElementById('thKart').innerText = t.kart;
            document.getElementById('thDriver').innerText = t.driver;
            document.getElementById('thLast').innerText = t.last;
            document.getElementById('thBest').innerText = t.best;

            // עדכון הטבלה מיד לאחר שינוי השפה
            updateTable();
        }

        // עדכון כל 3 שניות
        setInterval(updateTable, 3000);
        updateTable();
    </script>
</body>
</html>
