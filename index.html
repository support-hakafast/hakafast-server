<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>HAKAFAST | Live Display</title>
    <style>
        :root { --navy: #000080; --turquoise: #40E0D0; --purple: #800080; }
        h1 { font-size: 2.8em; font-weight: 800; margin-bottom: 5px; }
        .subtitle { font-size: 1.5em; color: var(--turquoise); font-weight: bold; margin-bottom: 25px; text-transform: uppercase; }
        .controls { margin-bottom: 30px; }
        .btn-lang { background-color: var(--navy); color: white; border: none; padding: 10px 24px; cursor: pointer; font-weight: bold; margin: 0 5px; border-radius: 6px; }
        .btn-lang:hover { background-color: var(--turquoise); color: var(--navy); }
        table { width: 100%; border-collapse: collapse; font-size: 1.8em; }
        th { background-color: var(--navy); color: #FFFFFF; padding: 20px; }
        td { border-bottom: 3px solid #f4f6f9; padding: 20px; font-weight: bold; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        .kart-badge { background: var(--navy); color: white; padding: 5px 15px; border-radius: 8px; font-size: 1.1em; display: inline-block; min-width: 60px; }
        .best-lap { color: var(--purple); font-weight: 900; }
        .tag-badge { font-size: 0.55em; padding: 4px 10px; border-radius: 6px; margin-inline-end: 12px; background-color: var(--turquoise); color: var(--navy); vertical-align: middle; }
        .status-banner { background: #e6fffa; border: 2px solid var(--turquoise); color: var(--navy); padding: 15px; font-size: 1.4em; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
        body { 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; 
            background-color: #FFFFFF; 
            color: var(--navy); 
            margin: 0; 
            padding: 30px; 
            text-align: center; 
        }
    </style>
</head>
<body>

    <h1 id="mainTitle">HAKAFAST</h1>
    <div id="subTitle" class="subtitle">LIVE DASHBOARD</div>
    
    <div class="controls">
        <button class="btn-lang" onclick="changeLanguage('he')">עברית</button>
        <button class="btn-lang" onclick="changeLanguage('en')">English</button>
        <button class="btn-lang" onclick="changeLanguage('ar')">العربية</button>
    </div>

    <div style="max-width: 1300px; margin: 0 auto;">
        <div id="statusBanner" class="status-banner" style="display: none;"></div>
        <table>
            <thead>
                <tr>
                    <th id="thPos" style="width: 80px;">#</th>
                    <th id="thKart" style="width: 160px;">קארט</th>
                    <th id="thDriver" style="text-align: start; padding-inline-start: 40px;">נהג</th>
                    <th id="thLast">זמן אחרון</th>
                    <th id="thBest">הכי מהיר</th>
                    <th id="thLaps" style="display: none;">הקפות</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        let words = {};
        let currentLang = 'he';
        let heatSettings = {};

        async function loadTranslations() {
            const res = await fetch('/api/translations');
            words = await res.json();
            applyLanguage();
        }

        async function updateTable() {
            try {
                // משיכת הגדרות מקצה
                const settingsRes = await fetch('/api/heat-settings');
                heatSettings = await settingsRes.json();
                
                // הצגה/הסתרה של עמודת הקפות במרוץ ספרינט
                const thLaps = document.getElementById('thLaps');
                if(heatSettings.type === 'sprint') {
                    thLaps.style.display = 'table-cell';
                    thLaps.innerText = words[currentLang]?.laps || 'LAPS';
                } else {
                    thLaps.style.display = 'none';
                }

                // משיכת זמנים
                const response = await fetch('/live-timing/1'); 
                const data = await response.json();
                const tbody = document.getElementById('tableBody');
                const banner = document.getElementById('statusBanner');
                tbody.innerHTML = '';

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" style="color: #999; padding: 40px;">No active drivers</td></tr>`;
                    banner.style.display = 'none';
                    return;
                }

                const heatNotStarted = data.every(row => !row.best_lap_time);
                if (heatNotStarted && words[currentLang]) {
                    banner.innerText = words[currentLang].status_waiting + ` (${words[currentLang]['heat_' + heatSettings.type]})`;
                    banner.style.display = 'block';
                } else {
                    banner.style.display = 'none';
                }

                data.forEach((row, index) => {
                    const levelKey = `level_${row.driver_level.toLowerCase()}`;
                    const translatedLevel = words[currentLang]?.[levelKey] || row.driver_level;
                    const tag = row.driver_level !== 'Amateur' ? `<span class="tag-badge">${translatedLevel.toUpperCase()}</span>` : '';
                    
                    let lapsCell = heatSettings.type === 'sprint' ? `<td>${row.lap_count} / ${heatSettings.targetLaps}</td>` : '';

                    tbody.innerHTML += `
                        <tr>
                            <td>${index + 1}</td>
                            <td><span class="kart-badge">${row.kart_number}</span></td>
                            <td style="text-align: start; padding-inline-start: 40px;">${tag}${row.driver_name}</td>
                            <td>${row.last_lap_time || '--.---'}</td>
                            <td class="${row.best_lap_time ? 'best-lap' : ''}">${row.best_lap_time || '--.---'}</td>
                            ${lapsCell}
                        </tr>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        function changeLanguage(lang) { currentLang = lang; applyLanguage(); }

        function applyLanguage() {
            if(!words[currentLang]) return;
            const t = words[currentLang];
            document.querySelector('body').dir = (currentLang === 'en') ? 'ltr' : 'rtl';
            document.getElementById('mainTitle').innerText = t.title;
            document.getElementById('thPos').innerText = t.pos;
            document.getElementById('thKart').innerText = t.kart;
            document.getElementById('thDriver').innerText = t.driver;
            document.getElementById('thLast').innerText = t.last_lap;
            document.getElementById('thBest').innerText = t.best_lap;
            updateTable();
        }

        loadTranslations();
        setInterval(updateTable, 2000);
    </script>
</body>
</html>
