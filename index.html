<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>HAKAFAST | Live Timing</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #FFFFFF; color: #000080; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #000080; border-bottom: 3px solid #40E0D0; display: inline-block; padding-bottom: 10px; }
        .controls { margin-bottom: 20px; }
        button { background-color: #000080; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin: 5px; border-radius: 5px; }
        button:hover { background-color: #40E0D0; color: #000080; }
        table { width: 100%; max-width: 1200px; margin: 20px auto; border-collapse: collapse; font-size: 1.6em; }
        th { background-color: #000080; color: #FFFFFF; padding: 15px; }
        td { border-bottom: 2px solid #f0f0f0; padding: 15px; font-weight: bold; }
        .best-lap { color: #800080; font-weight: 900; }
        .tag-badge { font-size: 0.6em; padding: 3px 8px; border-radius: 4px; margin-inline-end: 10px; background-color: #40E0D0; color: #000080; }
    </style>
</head>
<body>

    <h1 id="mainTitle">HAKAFAST</h1>
    
    <div class="controls">
        <button onclick="changeLanguage('he')">עברית</button>
        <button onclick="changeLanguage('en')">English</button>
        <button onclick="changeLanguage('ar')">العربية</button>
    </div>

    <table>
        <thead>
            <tr>
                <th id="thPos">#</th>
                <th id="thKart">קארט</th>
                <th id="thDriver">נהג</th>
                <th id="thLast">זמן אחרון</th>
                <th id="thBest">הכי מהיר</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        let words = {};
        let currentLang = 'he';

        async function loadTranslations() {
            const res = await fetch('/api/translations');
            words = await res.json();
            applyLanguage();
        }

        async function updateTable() {
            try {
                const response = await fetch('/live-timing/1'); 
                const data = await response.json();
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';

                data.forEach((row, index) => {
                    const isAnon = row.driver_name.startsWith('קארט #');
                    const displayName = isAnon && words[currentLang] ? `${words[currentLang].anonymous} ${row.kart_number}` : row.driver_name;
                    const tag = row.driver_level !== 'Amateur' ? `<span class="tag-badge">${row.driver_level.toUpperCase()}</span>` : '';
                    
                    tbody.innerHTML += `
                        <tr>
                            <td>${index + 1}</td>
                            <td>${row.kart_number}</td>
                            <td style="text-align: start;">${tag}${displayName}</td>
                            <td>${row.last_lap_time || '--.---'}</td>
                            <td class="best-lap">${row.best_lap_time || '--.---'}</td>
                        </tr>
                    `;
                });
            } catch (err) {}
        }

        function changeLanguage(lang) {
            currentLang = lang;
            applyLanguage();
        }

        function applyLanguage() {
            if(!words[currentLang]) return;
            const t = words[currentLang];
            document.querySelector('body').dir = (currentLang === 'en') ? 'ltr' : 'rtl';
            document.getElementById('mainTitle').innerText = t.title;
            document.getElementById('thPos').innerText = t.pos;
            document.getElementById('thKart').innerText = t.kart;
            document.getElementById('thDriver').innerText = t.driver;
            document.getElementById('thLast').innerText = t.last_lap;
            document.getElementById('thBest').innerText = t.best_lap;
            updateTable();
        }

        loadTranslations();
        setInterval(updateTable, 3000);
    </script>
</body>
</html>
